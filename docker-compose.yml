services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./fund_sales.db
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    volumes:
      - backend_data:/app

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  backend_data:
